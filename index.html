<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🍿 IMDb Parental Guide Search</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

  <style>
        body{
        padding-top:70px;
        font-family: system-ui,-apple-system,Segoe UI,Roboto;
        background: var(--bs-body-bg);
        transition: background .25s ease;
        }

        /* Dark mode */
        [data-bs-theme="dark"] body{
        background: linear-gradient(180deg,#0f1115,#14171d);
        }

        /* Light mode */
        [data-bs-theme="light"] body{
        background: linear-gradient(180deg,#f5f7fb,#e9eef6);
        }

        /* Navbar */
        .navbar{
        backdrop-filter: blur(12px);
        /* background: rgba(15,15,18,0.8) !important;
        border-bottom:1px solid rgba(255,255,255,0.05); */
        }

        /* Dark navbar */
        [data-bs-theme="dark"] .navbar{
        background: rgba(15,15,18,0.85) !important;
        border-bottom:1px solid rgba(255,255,255,0.05);
        }

        /* Light navbar */
        [data-bs-theme="light"] .navbar{
        background: rgba(255,255,255,0.9) !important;
        border-bottom:1px solid rgba(0,0,0,0.08);
        }

        .navbar-brand{
        font-weight:700;
        font-size:1.25rem;
        }

        /* Glass Container */
        .glass{
        backdrop-filter: blur(14px);
        border-radius:16px;
        padding:1.5rem;
        transition: all .25s ease;
        }

        /* Dark glass */
        [data-bs-theme="dark"] .glass{
        background: rgba(255,255,255,0.04);
        border:1px solid rgba(255,255,255,0.07);
        }

        /* Light glass */
        [data-bs-theme="light"] .glass{
        background: rgba(255,255,255,0.85);
        border:1px solid rgba(0,0,0,0.08);
        }

        /* Search */
        #searchForm{
        display:flex;
        flex-wrap:wrap;
        gap:.6rem;
        justify-content:center;
        }

        #searchForm input{
        max-width:420px;
        }

        .form-control,
        .form-select{
        border-radius:12px;
        }

        /* Title animation */
        .title-main{
        animation:fadeDown .5s ease;
        }

        .title-sub{
        animation:fadeUp .6s ease;
        }

        /* Hover effect */
        .title-main:hover{
        transform:scale(1.03);
        transition:.2s ease;
        }

        /* Animations */
        @keyframes fadeDown{
        from{
            opacity:0;
            transform:translateY(-10px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
        }

        @keyframes fadeUp{
        from{
            opacity:0;
            transform:translateY(10px);
        }
        to{
            opacity:1;
            transform:translateY(0);
        }
        }

        /* Movie Cards */
        .movie-card{
        display:flex;
        flex-direction:column;
        transition:all .25s ease;
        }

        .movie-card .season-btn{
        margin-top:auto;
        }

        .series-card{
        border:2px solid #4c7dff !important;
        }

        .movie-card:hover{
        transform:translateY(-6px) scale(1.02);
        }

        .movie-card img{
        width:100%;
        border-radius:12px;
        aspect-ratio: 10/15;
        object-fit:cover;
        transition: transform .4s ease;
        }

        .movie-card:hover img{
        transform: scale(1.05);
        }

        #year-input{
        min-width:110px;
        font-weight:500;
        }

        /* Movie Title */
        .movie-card .fw-bold{
        font-size:.95rem;
        line-height:1.2;
        }

        /* Latest movies scroll */
        #latestMovies{
        display:flex;
        overflow-x:auto;
        gap:12px;
        padding-bottom:10px;
        }

        #latestMovies::-webkit-scrollbar{
        height:6px;
        }

        
        [data-bs-theme="dark"] #latestMovies::-webkit-scrollbar-thumb{
        background:#444;
        }

        [data-bs-theme="light"] #latestMovies::-webkit-scrollbar-thumb{
        background:#bbb;
        }

        #latestMovies .col-6{
        flex:0 0 auto;
        width:170px;
        }

        /* Navbar text colors */
        [data-bs-theme="dark"] .navbar-brand{
        color:#fff;
        }

        [data-bs-theme="light"] .navbar-brand{
        color:#111;
        }

        /* Movies Grid */
        .results-grid{
        display:grid;
        gap:1rem;
        grid-template-columns:repeat(2,1fr); /* mobile */
        }

        /* tablets */
        @media (min-width:768px){
        .results-grid{
            grid-template-columns:repeat(4,1fr);
        }
        }

        /* desktop / landscape */
        @media (min-width:1200px){
        .results-grid{
            grid-template-columns:repeat(5,1fr);
        }
        }

        .cursor-pointer{
        cursor:pointer;
        }

        /* Better search button spacing */
        #searchForm button{
        padding:0.45rem 1.2rem;
        font-weight:500;
        }

        /* Slight spacing for search controls */
        #searchForm{
        align-items:center;
        }

        .poster-wrap{
        overflow:hidden;
        border-radius:12px;
        }

        .poster-wrap img{
        width:100%;
        aspect-ratio:10/15;
        object-fit:cover;
        transition:transform .35s ease;
        }

        .movie-card:hover .poster-wrap img{
        transform:scale(1.08);
        }

        .season-poster{
        display:block;
        margin:auto;
        width:180px;
        aspect-ratio:10/15;
        object-fit:cover;
        border-radius:14px;
        }

        .ep-btn{
        min-width:110px;
        }

        /* Buttons */
        .btn{
        border-radius:10px;
        }

        .btn-primary{
        background:#4c7dff;
        border:none;
        }

        .btn-primary:hover{
        background:#3b67e6;
        }

        /* Pagination */
        .pagination .page-link{
        border-radius:10px;
        margin:0 3px;
        }

        /* Fade animation */
        .fade-in{
        animation:fade .35s ease;
        }

        @keyframes fade{
        from{opacity:0; transform:translateY(6px);}
        to{opacity:1;}
        }

        /* Mobile */
        @media(max-width:576px){

        #searchForm{
            flex-direction:column;
            align-items:stretch;
        }

        #searchForm input{
            max-width:100%;
        }

        .movie-card img{
            aspect-ratio:2/3;
        }

        #latestMovies .col-6{
            width:140px;
        }

        }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar fixed-top shadow-sm px-3">
  <a class="navbar-brand fw-bold" id="homeTitle">🍿 IMDb Guide</a>
  <button class="btn btn-sm btn-outline-secondary" id="btnSwitch">
    <i class="fas fa-moon"></i>
  </button>
</nav>

<!-- SEARCH -->
<div class="container mt-4">
  <div class="glass text-center mb-4">
    <h2 class="fw-bold cursor-pointer mb-1 title-main" id="subTitle">
  🍿 IMDb Guide
    </h2>


<p class="text-secondary mb-3 cursor-pointer title-sub" id="pageTitle">
  Search Movies & TV Series Parental Guide
</p>

    <!-- Mobile Advanced Toggle -->
    <button class="btn btn-outline-secondary mb-2 d-sm-none" id="toggleAdvanced">Advanced ▼</button>

    <form id="searchForm" class="gap-2">
      <input id="movie-input" class="form-control" placeholder="Search IMDb...">

      <div id="advancedFilters" class="d-none d-sm-flex gap-2">
        <select id="year-input" class="form-select">
          <option value="">Year</option>
        </select>
        <select id="type-input" class="form-select">
          <option value="">All</option>
          <option value="movie">Movie</option>
          <option value="series">Series</option>
        </select>
      </div>

      <button class="btn btn-primary" type="submit">Search</button>
    </form>
  </div>



  <!-- Dynamic Results -->
  <div class="mt-4" id="resultsArea"></div>

  <!-- Pagination -->
  <nav id="pagination" class="mt-3 d-none">
    <ul class="pagination justify-content-center">
      <li class="page-item"><a class="page-link" href="#" id="prevBtn">Previous</a></li>
      <li class="page-item"><a class="page-link" href="#" id="nextBtn">Next</a></li>
    </ul>
  </nav>


   <div id="footer"></div>



 <script>
  fetch('https://raw.githubusercontent.com/siddharthsky/sky7t.github.io/refs/heads/main/src/components/footer.html')
    .then(response => response.text())
    .then(data => {
      document.getElementById('footer').innerHTML = data;
    })
    .catch(error => {
      console.error('Error fetching footer:', error);
    });
</script>

<script>
/* ===== THEME TOGGLE ===== */
const html = document.documentElement;
document.getElementById("btnSwitch").onclick = () => {
  const set = html.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-bs-theme", set);
  localStorage.setItem("theme", set);
};
window.onload = () => html.setAttribute("data-bs-theme", localStorage.getItem("theme") || "dark");

/* ===== API ===== */
const api = () => document.cookie.split(";")
  .find(x => x.trim().startsWith("savedAPIomdb="))?.split("=")[1] || "9004dd77";

/* ===== Helpers ===== */
async function apiCall(url) { return await (await fetch(url)).json(); }
function showLoader(){ document.getElementById("resultsArea").innerHTML = `<div class="text-center p-5"><div class="spinner-border"></div></div>`; }
function showMsg(text){ document.getElementById("resultsArea").innerHTML = `<div class="alert alert-warning">${text}</div>`; }

let page = 1, lastQuery = "";
let posterCache = {};  // store fetched posters

async function getPoster(imdbID){
  if(posterCache[imdbID]) return posterCache[imdbID];
  const data = await apiCall(`https://www.omdbapi.com/?apikey=${api()}&i=${imdbID}`);
  const poster = data.Poster && data.Poster !== "N/A"
    ? data.Poster
    : "https://placehold.co/175x259?text=No+Image";
  posterCache[imdbID] = poster;
  return poster;
}

/* ===== Render Movies ===== */
function renderMovies(list, containerId) {
  let html = `<div class="results-grid fade-in">`;
  list.forEach(m => html += `
    <div>
      <div class="glass movie-card h-100 ${m.Type === "series" ? "series-card" : ""}">
        <a href="https://www.imdb.com/title/${m.imdbID}/parentalguide" target="_blank">
          <div class="poster-wrap">
       <img 
  src="${m.Poster && m.Poster !== 'N/A' ? m.Poster : 'https://placehold.co/200x300?text=No+Image'}"
  onerror="this.onerror=null;this.src='https://placehold.co/200x300?text=No+Image';">
        </div>
        </a>
        <div class="mt-2 fw-bold">${m.Title}</div>
        <small class="text-secondary">${m.Year} — ${m.Type}</small>
        ${m.Type === "series" ? `<button class="btn btn-sm btn-outline-primary mt-2 season-btn" data-id="${m.imdbID}">Seasons</button>` : ""}
      </div>
    </div>
  `);
  document.getElementById(containerId).innerHTML = html + "</div>";
}

/* ===== Populate Year Selector ===== */
const yearSelect = document.getElementById("year-input");

const currentYear = new Date().getFullYear();
const startYear = currentYear + 1;   // allow upcoming movies
const endYear = 1970;                // IMDb era start

for (let y = startYear; y >= endYear; y--) {
  const opt = document.createElement("option");
  opt.value = y;
  opt.textContent = y;
  yearSelect.appendChild(opt);
}

/* ===== Search Movies ===== */
async function searchMovies(q, p = 1, y = "", type = "") {
  showLoader();
  let url = `https://www.omdbapi.com/?s=${encodeURIComponent(q)}&page=${p}&apikey=${api()}`;
  if (y) url += `&y=${y}`;
  if (type) url += `&type=${type}`;
  const data = await apiCall(url);
  if (data.Response === "False") return showMsg("⚠️ No results found.");
  renderMovies(data.Search, "resultsArea");
  document.getElementById("pagination").classList.remove("d-none");
}

/* ===== Form Submit ===== */
document.getElementById("searchForm").addEventListener("submit", e => {
  e.preventDefault();
  lastQuery = document.getElementById("movie-input").value.trim();
  if (!lastQuery) return;
  page = 1;
  const year = document.getElementById("year-input").value;
  const type = document.getElementById("type-input").value;
  searchMovies(lastQuery, page, year, type);
});

/* ===== Pagination ===== */
document.getElementById("nextBtn").onclick = e => { e.preventDefault(); searchMovies(lastQuery, ++page, document.getElementById("year-input").value, document.getElementById("type-input").value); }
document.getElementById("prevBtn").onclick = e => { e.preventDefault(); if(page>1) searchMovies(lastQuery, --page, document.getElementById("year-input").value, document.getElementById("type-input").value); }

/* ===== Seasons + Episodes ===== */
document.addEventListener("click", async (e) => {
  if (e.target.classList.contains("season-btn")) loadSeasons(e.target.dataset.id);
  if (e.target.id === "btnBack") searchMovies(lastQuery, page, document.getElementById("year-input").value, document.getElementById("type-input").value);
  if (e.target.id === "btnBackSeason") loadSeasons(e.target.dataset.id);
  if (e.target.classList.contains("ep-btn")) {
    const id = e.target.dataset.id; const season = e.target.dataset.season; showLoader();
    const seasonData = await apiCall(`https://www.omdbapi.com/?apikey=${api()}&i=${id}&Season=${season}`);
    if (!seasonData.Episodes) return showMsg("⚠️ No Episodes Found");

    const episodes = await Promise.all(seasonData.Episodes.map(async ep => ({...ep, poster: await getPoster(ep.imdbID)})));

    let html = `<button class="btn btn-outline-secondary mb-3" id="btnBackSeason" data-id="${id}">← Back to Seasons</button><div class="results-grid fade-in">`;    episodes.forEach(ep => {
      html += `<div><div class="glass movie-card h-100">
        <a href="https://www.imdb.com/title/${ep.imdbID}/parentalguide" target="_blank">
          <img src="${ep.poster}" 
     onerror="this.onerror=null;this.src='https://placehold.co/200x300?text=No+Image';">
        </a>
        <div class="fw-bold mt-2">${ep.Title}</div>
        <small class="text-secondary">Ep ${ep.Episode} — ${ep.Released}</small>
      </div></div>`;
    });
    html += "</div>";
    document.getElementById("resultsArea").innerHTML = html;
  }
});

/* ===== Load Seasons ===== */
async function loadSeasons(id) {
  showLoader();
  const info = await apiCall(`https://www.omdbapi.com/?apikey=${api()}&i=${id}`);
  const total = parseInt(info.totalSeasons) || 0;
  let html = `<button class="btn btn-outline-secondary mb-3" id="btnBack">← Back</button>
    <div class="glass text-center fade-in">
      <img class="season-poster mb-3"
        src="${info.Poster !== "N/A" ? info.Poster : "https://placehold.co/200x300?text=No+Image"}"
onerror="this.onerror=null;this.src='https://placehold.co/200x300?text=No+Image';">
      <h4>${info.Title} (${info.Year})</h4>
      <p class="text-secondary">Select a season</p>`;
  for (let i = 1; i <= total; i++) html += `<button class="btn btn-primary m-1 ep-btn" data-id="${id}" data-season="${i}">Season ${i}</button>`;
  html += "</div>";
  document.getElementById("pagination").classList.add("d-none");
  document.getElementById("resultsArea").innerHTML = html;
}

/* ===== Reload / Reset on Title Click ===== */
function resetApp(){

document.getElementById("searchForm").reset();

document.getElementById("resultsArea").innerHTML = "";
document.getElementById("pagination").classList.add("d-none");

page = 1;
lastQuery = "";

}

document.getElementById("homeTitle").onclick = resetApp;
document.getElementById("pageTitle").onclick = resetApp;
document.getElementById("subTitle").onclick = resetApp;

/* ===== Toggle Advanced Filters on Mobile ===== */
document.getElementById("toggleAdvanced").onclick = () => {
  const adv = document.getElementById("advancedFilters");
  adv.classList.toggle("d-none");
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
