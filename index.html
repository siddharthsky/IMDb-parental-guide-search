<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>🍿 IMDb Parental Guide Search</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

  <style>
    body { padding-top: 65px; background: var(--bs-body-bg); }
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 1.2rem;
    }
    .movie-card img {
      border-radius: 12px;
      width: 100%;
      aspect-ratio: 10/15;
      object-fit: cover;
    }
    .fade-in { animation: fade .4s ease-in-out; }
    @keyframes fade { from {opacity:0;} to {opacity:1;} }

    /* ===== MOBILE IMPROVEMENTS ===== */
    #searchForm {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      align-items: center;
    }
    #searchForm .form-control,
    #searchForm .form-select,
    #searchForm .btn {
      min-width: 120px;
    }
    #searchForm .btn {
      min-width: 100px;
    }

    @media (max-width: 576px) {
      #searchForm {
        flex-direction: column;
        align-items: stretch;
      }
      #searchForm .form-control,
      #searchForm .form-select,
      #searchForm .btn {
        width: 100%;
      }
      .movie-card img { aspect-ratio: 2/3; }
      .movie-card .btn { min-width: 100%; margin-top: 0.5rem; }
      #latestMovies { display: flex; overflow-x: auto; gap: 0.5rem; padding-bottom: 0.5rem; }
      #latestMovies .col-6 { flex: 0 0 auto; width: 140px; }
      .pagination .page-link { padding: 0.5rem 1rem; font-size: 0.9rem; }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar fixed-top navbar-dark bg-dark shadow-sm px-3">
  <a class="navbar-brand fw-bold" id="homeTitle">🍿 IMDb Guide</a>
  <button class="btn btn-sm btn-outline-light" id="btnSwitch">
    <i class="fas fa-moon"></i>
  </button>
</nav>

<!-- SEARCH -->
<div class="container mt-4">
  <div class="glass text-center mb-4">
    <h2 class="fw-bold" id="pageTitle">Search Movies & TV Series Parental Guide</h2>

    <!-- Mobile Advanced Toggle -->
    <button class="btn btn-outline-secondary mb-2 d-sm-none" id="toggleAdvanced">Advanced ▼</button>

    <form id="searchForm" class="gap-2">
      <input id="movie-input" class="form-control" placeholder="Search IMDb...">

      <div id="advancedFilters" class="d-none d-sm-flex gap-2">
        <select id="year-input" class="form-select">
          <option value="">Year</option>
        </select>
        <select id="type-input" class="form-select">
          <option value="">All</option>
          <option value="movie">Movie</option>
          <option value="series">Series</option>
        </select>
      </div>

      <button class="btn btn-primary" type="submit">Search</button>
    </form>
  </div>

  <!-- Latest Movies -->
  <h4 id="latestTitle">🔥 Latest Movies (2025)</h4>
  <div class="row g-3" id="latestMovies"></div>

  <!-- Dynamic Results -->
  <div class="mt-4" id="resultsArea"></div>

  <!-- Pagination -->
  <nav id="pagination" class="mt-3 d-none">
    <ul class="pagination justify-content-center">
      <li class="page-item"><a class="page-link" href="#" id="prevBtn">Previous</a></li>
      <li class="page-item"><a class="page-link" href="#" id="nextBtn">Next</a></li>
    </ul>
  </nav>

  <div class="text-center mt-4">
    <small class="text-secondary">IMDb Data © via OMDb API</small>
  </div>
</div>

<script>
/* ===== THEME TOGGLE ===== */
const html = document.documentElement;
document.getElementById("btnSwitch").onclick = () => {
  const set = html.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
  html.setAttribute("data-bs-theme", set);
  localStorage.setItem("theme", set);
};
window.onload = () => html.setAttribute("data-bs-theme", localStorage.getItem("theme") || "dark");

/* ===== API ===== */
const api = () => document.cookie.split(";")
  .find(x => x.trim().startsWith("savedAPIomdb="))?.split("=")[1] || "9004dd77";

/* ===== Helpers ===== */
async function apiCall(url) { return await (await fetch(url)).json(); }
function showLoader(){ document.getElementById("resultsArea").innerHTML = `<div class="text-center p-5"><div class="spinner-border"></div></div>`; }
function showMsg(text){ document.getElementById("resultsArea").innerHTML = `<div class="alert alert-warning">${text}</div>`; }

let page = 1, lastQuery = "";
let posterCache = {};  // store fetched posters

async function getPoster(imdbID){
  if(posterCache[imdbID]) return posterCache[imdbID];
  const data = await apiCall(`https://www.omdbapi.com/?apikey=${api()}&i=${imdbID}`);
  const poster = data.Poster && data.Poster !== "N/A"
    ? data.Poster
    : "https://placehold.co/175x259?text=No+Image";
  posterCache[imdbID] = poster;
  return poster;
}

/* ===== Render Movies ===== */
function renderMovies(list, containerId) {
  let html = `<div class="row g-3 fade-in">`;
  list.forEach(m => html += `
    <div class="col-6 col-md-3">
      <div class="glass movie-card h-100">
        <a href="https://www.imdb.com/title/${m.imdbID}/parentalguide" target="_blank">
          <img src="${m.Poster !== "N/A" ? m.Poster : "https://placehold.co/200x300"}">
        </a>
        <div class="mt-2 fw-bold">${m.Title}</div>
        <small class="text-secondary">${m.Year} — ${m.Type}</small>
        ${m.Type === "series" ? `<button class="btn btn-sm btn-outline-primary mt-2 season-btn" data-id="${m.imdbID}">Seasons</button>` : ""}
      </div>
    </div>
  `);
  document.getElementById(containerId).innerHTML = html + "</div>";
}

/* ===== Latest Movies ===== */
async function loadLatest() {
  const data = await apiCall(`https://www.omdbapi.com/?apikey=${api()}&s=movie&y=2025`);
  if (data.Response === "True") renderMovies(data.Search.slice(0,8), "latestMovies");
}
function hideLatest(){ document.getElementById("latestTitle").style.display = "none"; document.getElementById("latestMovies").style.display = "none"; }
loadLatest();
hideLatest();

/* ===== Populate Year Selector ===== */
const yearSelect = document.getElementById("year-input");
for (let y = 2025; y >= 2000; y--) {
  const opt = document.createElement("option"); opt.value = y; opt.textContent = y; yearSelect.appendChild(opt);
}

/* ===== Search Movies ===== */
async function searchMovies(q, p = 1, y = "", type = "") {
  showLoader();
  let url = `https://www.omdbapi.com/?s=${encodeURIComponent(q)}&page=${p}&apikey=${api()}`;
  if (y) url += `&y=${y}`;
  if (type) url += `&type=${type}`;
  const data = await apiCall(url);
  if (data.Response === "False") return showMsg("⚠️ No results found.");
  hideLatest();
  renderMovies(data.Search, "resultsArea");
  document.getElementById("pagination").classList.remove("d-none");
}

/* ===== Form Submit ===== */
document.getElementById("searchForm").addEventListener("submit", e => {
  e.preventDefault();
  lastQuery = document.getElementById("movie-input").value.trim();
  if (!lastQuery) return;
  page = 1;
  const year = document.getElementById("year-input").value;
  const type = document.getElementById("type-input").value;
  searchMovies(lastQuery, page, year, type);
});

/* ===== Pagination ===== */
document.getElementById("nextBtn").onclick = e => { e.preventDefault(); searchMovies(lastQuery, ++page, document.getElementById("year-input").value, document.getElementById("type-input").value); }
document.getElementById("prevBtn").onclick = e => { e.preventDefault(); if(page>1) searchMovies(lastQuery, --page, document.getElementById("year-input").value, document.getElementById("type-input").value); }

/* ===== Seasons + Episodes ===== */
document.addEventListener("click", async (e) => {
  if (e.target.classList.contains("season-btn")) loadSeasons(e.target.dataset.id);
  if (e.target.id === "btnBack") searchMovies(lastQuery, page, document.getElementById("year-input").value, document.getElementById("type-input").value);
  if (e.target.id === "btnBackSeason") loadSeasons(e.target.dataset.id);
  if (e.target.classList.contains("ep-btn")) {
    const id = e.target.dataset.id; const season = e.target.dataset.season; showLoader();
    const seasonData = await apiCall(`https://www.omdbapi.com/?apikey=${api()}&i=${id}&Season=${season}`);
    if (!seasonData.Episodes) return showMsg("⚠️ No Episodes Found");

    const episodes = await Promise.all(seasonData.Episodes.map(async ep => ({...ep, poster: await getPoster(ep.imdbID)})));

    let html = `<button class="btn btn-outline-secondary mb-3" id="btnBackSeason" data-id="${id}">← Back to Seasons</button><div class="row g-3 fade-in">`;
    episodes.forEach(ep => {
      html += `<div class="col-6 col-md-3"><div class="glass movie-card h-100">
        <a href="https://www.imdb.com/title/${ep.imdbID}/parentalguide" target="_blank">
          <img src="${ep.poster}">
        </a>
        <div class="fw-bold mt-2">${ep.Title}</div>
        <small class="text-secondary">Ep ${ep.Episode} — ${ep.Released}</small>
      </div></div>`;
    });
    html += "</div>";
    document.getElementById("resultsArea").innerHTML = html;
  }
});

/* ===== Load Seasons ===== */
async function loadSeasons(id) {
  showLoader();
  const info = await apiCall(`https://www.omdbapi.com/?apikey=${api()}&i=${id}`);
  const total = parseInt(info.totalSeasons) || 0;
  let html = `<button class="btn btn-outline-secondary mb-3" id="btnBack">← Back</button>
    <div class="glass text-center fade-in">
      <img class="movie-card mb-2" style="aspect-ratio:10/15; width:180px; border-radius:14px;"
        src="${info.Poster !== "N/A" ? info.Poster : "https://placehold.co/200x300"}">
      <h4>${info.Title} (${info.Year})</h4>
      <p class="text-secondary">Select a season</p>`;
  for (let i = 1; i <= total; i++) html += `<button class="btn btn-primary m-1 ep-btn" data-id="${id}" data-season="${i}">Season ${i}</button>`;
  html += "</div>";
  hideLatest();
  document.getElementById("pagination").classList.add("d-none");
  document.getElementById("resultsArea").innerHTML = html;
}

/* ===== Reload / Reset on Title Click ===== */
document.getElementById("homeTitle").onclick = () => location.reload();
document.getElementById("pageTitle").onclick = () => location.reload();

/* ===== Toggle Advanced Filters on Mobile ===== */
document.getElementById("toggleAdvanced").onclick = () => {
  const adv = document.getElementById("advancedFilters");
  adv.classList.toggle("d-none");
};
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
